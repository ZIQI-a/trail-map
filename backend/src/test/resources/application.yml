spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:trailmap;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
