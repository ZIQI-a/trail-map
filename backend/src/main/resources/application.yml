server:
  port: 8080
  address: 127.0.0.1

spring:
  application:
    name: trailmap-backend
  config:
    import: optional:file:.env.local[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${TRAILMAP_DB_HOST:localhost}:${TRAILMAP_DB_PORT:3306}/${TRAILMAP_DB_NAME:trailmap}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${TRAILMAP_DB_USERNAME:root}
    password: ${TRAILMAP_DB_PASSWORD:ziqi0522@}
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

baidu:
  map:
    server-ak: ${BAIDU_MAP_SERVER_AK:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
