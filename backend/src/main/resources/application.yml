server:
  port: 8080
  address: 127.0.0.1

spring:
  application:
    name: trailmap-backend
  config:
    import: optional:file:.env.local[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${TRAILMAP_DB_HOST:localhost}:${TRAILMAP_DB_PORT:3306}/${TRAILMAP_DB_NAME:trailmap}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${TRAILMAP_DB_USERNAME:root}
    # 数据库密码必须由本地环境变量或 backend/.env.local 注入，避免凭据进入仓库。
    password: ${TRAILMAP_DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

baidu:
  map:
    server-ak: ${BAIDU_MAP_SERVER_AK:}

trailmap:
  auth:
    # Token 签名密钥禁止使用可预测默认值，缺失时直接阻止应用启动。
    token-secret: ${TRAILMAP_AUTH_TOKEN_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
